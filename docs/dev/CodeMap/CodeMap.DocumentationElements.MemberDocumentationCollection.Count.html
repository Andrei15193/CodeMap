<p>Property type: <a href="https://docs.microsoft.com/dotnet/api/System.Int32?view=netstandard-2.1">int</a>.</p>
<p>Gets the total number of <a href="../../dev/CodeMap/CodeMap.DocumentationElements.MemberDocumentation.html">MemberDocumentation</a> items in the collection.
</p>

<p>This is a read only property (<code>public get</code>).</p>
